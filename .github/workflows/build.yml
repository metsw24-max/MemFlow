name: MemFlow Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  MAVEN_OPTS: >-
    --add-opens=jdk.unsupported/sun.misc=ALL-UNNAMED
    --add-opens=java.base/java.lang=ALL-UNNAMED

jobs:
  build:
    name: Build & Test (${{ matrix.os }} / JDK ${{ matrix.java }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        java: [ '11', '17', '21' ]

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      - name: Compile Codebase
        run: mvn -B compile

      - name: Execute Automated Test Suite
        run: mvn -B test

      - name: Package Artifact
        run: mvn -B -DskipTests package

      - name: Upload Surefire Reports on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ matrix.os }}-jdk${{ matrix.java }}
          path: target/surefire-reports/
          retention-days: 7

      - name: Upload JVM Crash Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jvm-crash-logs-${{ matrix.os }}-jdk${{ matrix.java }}
          path: |
            hs_err_pid*.log
            replay_pid*.log
          retention-days: 7
          if-no-files-found: ignore

  sanitizer:
    name: JVM Sanitizer (NMT + JNI Check + Strict Verify)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Prepare diagnostic directories
        run: mkdir -p target/heap-dumps

      - name: Run Test Suite with Strict JVM Diagnostic Flags
        # Activates the "sanitizer" Maven profile which appends:
        #   -Xcheck:jni, -Xverify:all, -XX:NativeMemoryTracking=detail,
        #   -XX:+CrashOnOutOfMemoryError, -XX:+HeapDumpOnOutOfMemoryError
        # See pom.xml <profile id="sanitizer"> for the full flag list.
        run: mvn -B -Psanitizer test

      - name: Upload Surefire Reports on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-surefire-reports
          path: target/surefire-reports/
          retention-days: 7

      - name: Upload Heap Dumps and Crash Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-diagnostics
          path: |
            target/heap-dumps/
            hs_err_pid*.log
            replay_pid*.log
          retention-days: 7
          if-no-files-found: ignore

  smoke-demo:
    name: CLI Smoke Test (Indexer Demo)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run Indexer CLI Demo
        run: mvn -B exec:java -Dexec.args="--run-indexer"

      - name: Verify Exported Index File Exists
        run: test -f logs_index/memflow_index.idx
